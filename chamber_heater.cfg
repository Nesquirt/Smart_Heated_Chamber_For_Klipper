#################################################
# SMART CHAMBER HEATER - ADAPTIVE PREDICTIVE CONTROL
#
# PTC chamber heating controller for Klipper.
# Exhaust fan and assist fans must already be defined in printer.cfg.
#
# MAIN FEATURES
# - Linear control mode for limited-heater setups.
# - Hybrid Predictive Control for mostly linear heating with predictive unloading near the target.
# - Full Adaptive Predictive Control for high-headroom heaters.
# - Automatic control mode selection based on available thermal headroom.
# - PTC thermal-memory prediction using chamber rate and PTC stored heat.
# - Progressive post-target PTC and fan unloading.
# - Hold mode to keep the PTC warm and reduce chamber drops.
# - Independent heat-assist fan release.
# - Chamber overshoot cooling through exhaust fan.
# - PTC soft limit, safety shutdown and cooldown logic.
#
# IMPORTANT SAFETY NOTE
# Set variable_thermal_fuse_temp to the REAL installed thermal fuse rating.
# Do not increase it unless the thermal fuse has physically been replaced.
#################################################

[gcode_macro _CHAMBERVARS]
# --- FAN NAMES ---
variable_heater_fan_name: "chamber_heater_fan"
variable_exhaust_fan_name: "Exhaust"
variable_heat_assist_fans: "RSCS"                 # Heating-only assist fans, comma-separated. Example: "RSCS,Fan2" if u dont have an auxiliary fan leave empty ""
variable_heat_assist_done: 1                      # Internal state: 0 = macro controls assist fans during heatup, 1 = assist fans released for manual/other macro control
variable_heat_assist_release_offset: 0.2             # Assist fans release point: TARGET + this offset. 0.0 = release exactly at chamber target.

# --- MAIN SETTINGS ---
variable_thermal_fuse_temp: 85
variable_max_chamber_target: 75

# --- AUTO CALCULATED LIMITS with thermal_fuse_temp  ---
# heater_max:             thermal_fuse_temp - 10
# heater_soft_limit:      thermal_fuse_temp - 7
# heater_soft_release:    heater_max - 3
# heater_soft_target:     heater_max - 10
# heater_safety:          thermal_fuse_temp - 5
# heater_safety_release:  heater_safety - 6

# --- AUTO CALCULATED CHAMBER LIMITS with max_chamber_target  ---
# chamber_soft_limit:     max_chamber_target + 7
# chamber_soft_release:   max_chamber_target + 1

# Heating curve
variable_heater_min: 45
variable_approach_delta: 2.0
variable_fine_delta: 0.3
variable_fine_heater_target: 70

# Anti-chatter around chamber target
variable_heating_cutoff_offset: 0.3
variable_heating_resume_offset: 0.5
variable_target_hold_alarm: 0

# Hold / maintenance after chamber reaches target
# Keeps the PTC warm instead of turning it fully off, reducing chamber temperature oscillation.
variable_hold_enabled: 1                         # 1 = keep PTC warm during target hold, 0 = PTC OFF during hold
variable_hold_ptc_delta: 5                     # Hold PTC target = chamber TARGET + this delta. Example: 55C chamber target and delta 5C -> 60C PTC target.
variable_hold_fan_speed: 0.65                    # Heater fan speed during target hold. 0.50 = 50%

#################################################
# !!! USER SETTINGS - CONTROL ALGORITHM !!!
#
# This section selects how the heater behaves during heat-up
# and during the approach to the chamber target.
#
# CONTROL MODES
#
# -1 = AUTOMATIC CONTROL SELECTION
#      The macro chooses the control algorithm from thermal headroom.
#
#  0 = LINEAR CONTROL
#      Uses the current chamber temperature only.
#      Best for weak/limited heaters that need maximum power until target.
#
#  1 = HYBRID PREDICTIVE CONTROL
#      Uses full-power heat-up below target, but can unload earlier
#      if prediction shows the chamber will exceed the allowed target window.
#
#  2 = FULL ADAPTIVE PREDICTIVE CONTROL
#      Uses chamber temperature, chamber heating rate, PTC stored heat
#      and adaptive curve shaping to adapt PTC and fan output continuously.
#################################################

# !!! USER EDITABLE !!!
# -1 = Auto, 0 = Linear, 1 = Hybrid Predictive, 2 = Full Adaptive Predictive Control.
variable_control_mode: 1

# !!! USER EDITABLE !!!
# Auto mode thermal headroom threshold for Linear Control.
#
# Thermal headroom = HEATER_MAX - chamber TARGET.
#
# If thermal headroom is less than or equal to this value,
# Auto mode selects Linear Control.
#
# Recommended for weak heaters:
# 25-35C
variable_auto_linear_headroom: 25

# !!! USER EDITABLE !!!
# Auto mode thermal headroom threshold for Hybrid Predictive Control.
#
# If thermal headroom is above auto_linear_headroom but less than or equal
# to this value, Auto mode selects Hybrid Predictive Control.
#
# Above this value, Auto mode selects Full Adaptive Predictive Control.
#
# Recommended:
# 50-60C
variable_auto_hybrid_headroom: 50

# Prediction horizon, expressed in chamberloop cycles.
#
# Higher values:
# - earlier prediction
# - more overshoot prevention
# - slower approach to target
#
# Lower values:
# - later prediction
# - faster approach to target
# - more aggressive heating
variable_prediction_horizon: 1.0

# Pre-target prediction window.
#
# The predictive ramp can start when the predicted chamber temperature
# enters TARGET - this value.
#
# Weak heater:
# 0.2-0.5C
#
# Powerful heater:
# 1.0-2.0C
variable_prediction_pre_target_window: 0.3

# Thermal memory weight of the PTC.
#
# This estimates how much remaining PTC heat may still warm the chamber.
# It uses the difference between current PTC temperature and HOLD PTC target.
#
# Higher values:
# - unloads earlier
# - reduces overshoot
#
# Lower values:
# - keeps more heat
# - improves heat-up speed
variable_thermal_memory_weight: 0.015

# Rate gain based on chamber heating speed.
#
# Higher values:
# - reacts more strongly to fast chamber rise
# - unloads earlier
#
# Lower values:
# - behaves closer to temperature-only control
variable_prediction_rate_gain: 1.0

# Chamber rate deadband.
#
# Small changes below this value are treated as noise and ignored.
variable_prediction_rate_deadband: 0.02

# Adaptive curve mode used by predictive control.
#
# 0 = Linear ramp
#     Simple and predictable.
#
# 1 = Quadratic ease-in
#     Keeps more power early and unloads later.
#
# 2 = Smoothstep S-curve
#     Balanced adaptive unloading. Recommended starting point.
variable_adaptive_curve_mode: 2

# Minimum predictive ramp progress once prediction enters the control window.
#
# Helps avoid tiny ineffective corrections.
variable_adaptive_min_progress: 0.0

# Maximum pre-target unloading allowed before the real chamber reaches TARGET.
#
# Example:
# 0.35 means predictive control can apply at most 35% of the unloading ramp
# before the chamber physically reaches the requested target.
#
# Increase for powerful heaters.
# Decrease for weak heaters.
variable_adaptive_max_pre_target_progress: 0.35


#################################################
# !!! USER SETTINGS - HEATER FAN SPEEDS !!!
#################################################

variable_fan_min: 0.75
variable_fan_heat_max: 1.0
variable_fan_max: 1.0
variable_fan_gain: 0.03

# Cooldown
variable_cooldown_temp: 35
variable_cooldown_fan: 1.0
variable_exhaust_cooldown: 1.0

# Modulated exhaust fan for chamber overshoot
variable_overshoot_cooling_delta: 1.5
variable_overshoot_cooling_release: 0.2
variable_overshoot_cooling_alarm: 0
variable_exhaust_min: 0.35
variable_exhaust_max: 1.0
variable_exhaust_gain: 0.20

# Internal states
variable_chamber_alarm: 0
variable_heater_soft_alarm: 0
variable_heater_alarm: 0
variable_last_chamber: 0
variable_rate_limit: 0.25
gcode:


[heater_generic chamber_heater]
heater_pin: PF6
sensor_type: Generic 3950
sensor_pin: PF9
control: pid
pid_Kp: 18.734
pid_Ki: 1.201
pid_Kd: 73.062
max_power: 0.50
min_temp: 0
max_temp: 90


[verify_heater chamber_heater]
max_error: 120
check_gain_time: 120
hysteresis: 5
heating_gain: 2


[fan_generic chamber_heater_fan]
pin: PA3
max_power: 1.0
kick_start_time: 0.5
off_below: 0.10


[temperature_sensor Chamber_Temperature]
sensor_type: Generic 3950
sensor_pin: PC0
min_temp: 0
max_temp: 110


[gcode_macro _CHAMBER_TARGET]
variable_target: 0
gcode:


# Sets the heater circulation fan speed with automatic clamping (0.0-1.0).
[gcode_macro _SET_CHAMBER_FAN]
gcode:
    {% set VARS = printer["gcode_macro _CHAMBERVARS"] %}
    {% set FAN = VARS.heater_fan_name|string %}
    {% set S = params.SPEED|default(0)|float %}
    {% if S < 0 %}
        {% set S = 0 %}
    {% elif S > 1 %}
        {% set S = 1 %}
    {% endif %}
    SET_FAN_SPEED FAN={FAN} SPEED={S}


# Sets the exhaust fan speed with automatic clamping (0.0-1.0).
[gcode_macro _SET_EXHAUST_FAN]
gcode:
    {% set VARS = printer["gcode_macro _CHAMBERVARS"] %}
    {% set FAN = VARS.exhaust_fan_name|string %}
    {% set S = params.SPEED|default(0)|float %}
    {% if S < 0 %}
        {% set S = 0 %}
    {% elif S > 1 %}
        {% set S = 1 %}
    {% endif %}
    SET_FAN_SPEED FAN={FAN} SPEED={S}


# Sets the speed of all configured assist fans.
# Fan names are read from variable_heat_assist_fans and can be comma-separated.
[gcode_macro _SET_HEAT_ASSIST_FANS]
gcode:
    {% set VARS = printer["gcode_macro _CHAMBERVARS"] %}
    {% set FANS = VARS.heat_assist_fans|string %}
    {% set S = params.SPEED|default(0)|float %}
    {% if S < 0 %}
        {% set S = 0 %}
    {% elif S > 1 %}
        {% set S = 1 %}
    {% endif %}

    {% for FAN in FANS.split(",") %}
        {% set FAN = FAN|trim %}
        {% if FAN != "" %}
            SET_FAN_SPEED FAN={FAN} SPEED={S}
        {% endif %}
    {% endfor %}


# Displays all calculated safety limits based on the configured thermal fuse
# temperature and maximum chamber target.
[gcode_macro CHAMBER_LIMITS]
gcode:
    {% set VARS = printer["gcode_macro _CHAMBERVARS"] %}
    {% set FUSE = VARS.thermal_fuse_temp|float %}
    {% set MAXC = VARS.max_chamber_target|float %}

    {% set HEATER_MAX = FUSE - 10 %}
    {% set HEATER_SOFT_LIMIT = FUSE - 7 %}
    {% set HEATER_SOFT_RELEASE = HEATER_MAX - 3 %}
    {% set HEATER_SOFT_TARGET = HEATER_MAX - 10 %}
    {% set HEATER_SAFETY = FUSE - 5 %}
    {% set HEATER_SAFETY_RELEASE = HEATER_SAFETY - 6 %}
    {% set CHAMBER_SOFT_LIMIT = MAXC + 7 %}
    {% set CHAMBER_SOFT_RELEASE = MAXC + 1 %}

    RESPOND MSG="PTC max={HEATER_MAX}C | soft={HEATER_SOFT_LIMIT}C release={HEATER_SOFT_RELEASE}C target={HEATER_SOFT_TARGET}C | safety={HEATER_SAFETY}C release={HEATER_SAFETY_RELEASE}C"
    RESPOND MSG="Chamber max target={MAXC}C | soft={CHAMBER_SOFT_LIMIT}C release={CHAMBER_SOFT_RELEASE}C"


# Waits until the chamber temperature reaches the requested range.
# Compatible with both MIN/MAX and MINIMUM/MAXIMUM parameters.
[gcode_macro CHAMBER_TEMP_WAIT]
gcode:
    {% set MIN = params.MIN|default(params.MIN_TEMPERATURE|default(None)) %}
    {% set MAX = params.MAX|default(params.MAX_TEMPERATURE|default(None)) %}

    {% if MIN is none and MAX is none %}
        {action_raise_error("Use CHAMBER_TEMP_WAIT MIN=50 or MAX=50")}
    {% endif %}

    {% if MIN is not none and MAX is not none %}
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber_Temperature" MINIMUM={MIN|float} MAXIMUM={MAX|float}
    {% elif MIN is not none %}
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber_Temperature" MINIMUM={MIN|float}
    {% else %}
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber_Temperature" MAXIMUM={MAX|float}
    {% endif %}


# Marlin-compatible command: sets the chamber temperature target.
[gcode_macro M141]
gcode:
    {% set S = params.S|default(0)|float %}
    SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={S}


# Marlin-compatible command: sets the chamber target and waits
# until the chamber reaches the requested temperature.
[gcode_macro M191]
gcode:
    {% set S = params.S|default(0)|float %}
    {% set MAX_TARGET = printer["gcode_macro _CHAMBERVARS"].max_chamber_target|float %}

    {% if S > MAX_TARGET %}
        {% set S = MAX_TARGET %}
    {% endif %}

    SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={S}

    {% if S > 0 %}
        CHAMBER_TEMP_WAIT MIN={S - 0.5}
    {% endif %}


# Wrapper around SET_HEATER_TEMPERATURE.
# Adds chamber-specific state handling and starts the control loop.
[gcode_macro SET_HEATER_TEMPERATURE]
rename_existing: _SET_HEATER_TEMPERATURE
gcode:
    {% set HEATER = params.HEATER|default("None") %}
    {% set TARGET = params.TARGET|default(0)|float %}
    {% set MAX_TARGET = printer["gcode_macro _CHAMBERVARS"].max_chamber_target|float %}

    {% if HEATER|lower == "chamber_heater" %}

        {% if TARGET <= 0 %}
            SET_GCODE_VARIABLE MACRO=_CHAMBER_TARGET VARIABLE=target VALUE=0
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=chamber_alarm VALUE=0
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heater_alarm VALUE=0
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heater_soft_alarm VALUE=0
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=overshoot_cooling_alarm VALUE=0
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=target_hold_alarm VALUE=0
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heat_assist_done VALUE=0
            _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=0
            UPDATE_DELAYED_GCODE ID=chamberloop DURATION=1
            M117 Chamber OFF - cooldown

        {% elif TARGET > MAX_TARGET %}
            {% set TARGET = MAX_TARGET %}
            SET_GCODE_VARIABLE MACRO=_CHAMBER_TARGET VARIABLE=target VALUE={TARGET}
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=target_hold_alarm VALUE=0
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heat_assist_done VALUE=0
            _SET_EXHAUST_FAN SPEED=0
            UPDATE_DELAYED_GCODE ID=chamberloop DURATION=1
            M117 Chamber limited to {TARGET}C

        {% else %}
            SET_GCODE_VARIABLE MACRO=_CHAMBER_TARGET VARIABLE=target VALUE={TARGET}
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=target_hold_alarm VALUE=0
            SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heat_assist_done VALUE=0
            _SET_EXHAUST_FAN SPEED=0
            UPDATE_DELAYED_GCODE ID=chamberloop DURATION=1
            M117 Chamber target {TARGET}C
        {% endif %}

    {% else %}
        _SET_HEATER_TEMPERATURE HEATER={HEATER} TARGET={TARGET}
    {% endif %}


# Wrapper around TURN_OFF_HEATERS.
# Resets all chamber states and starts the cooldown sequence.
[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS
gcode:
    _TURN_OFF_HEATERS
    SET_GCODE_VARIABLE MACRO=_CHAMBER_TARGET VARIABLE=target VALUE=0
    SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=chamber_alarm VALUE=0
    SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heater_alarm VALUE=0
    SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heater_soft_alarm VALUE=0
    SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=overshoot_cooling_alarm VALUE=0
    SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=target_hold_alarm VALUE=0
    SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heat_assist_done VALUE=0
    UPDATE_DELAYED_GCODE ID=chamberloop DURATION=1
    M117 Heaters OFF - chamber cooldown


# Main chamber control loop.
# Handles heat-up, hold mode, overshoot control, safety protection,
# cooldown, chamber fan, exhaust fan and assist fan management.
[delayed_gcode chamberloop]
gcode:
    {% set VARS = printer["gcode_macro _CHAMBERVARS"] %}
    {% set TARGET = printer["gcode_macro _CHAMBER_TARGET"].target|float %}

    {% set CHAMBER = printer["temperature_sensor Chamber_Temperature"].temperature|float %}
    {% set HEATER_TEMP = printer["heater_generic chamber_heater"].temperature|float %}

    {% set THERMAL_FUSE = VARS.thermal_fuse_temp|float %}
    {% set MAX_CHAMBER_TARGET = VARS.max_chamber_target|float %}

    {% set HEATER_MAX = THERMAL_FUSE - 10 %}
    {% set HEATER_SOFT_LIMIT = THERMAL_FUSE - 7 %}
    {% set HEATER_SOFT_RELEASE = HEATER_MAX - 3 %}
    {% set HEATER_SOFT_TARGET = HEATER_MAX - 10 %}
    {% set HEATER_SAFETY = THERMAL_FUSE - 5 %}
    {% set HEATER_SAFETY_RELEASE = HEATER_SAFETY - 6 %}

    {% set CHAMBER_SOFT_LIMIT = MAX_CHAMBER_TARGET + 7 %}
    {% set CHAMBER_SOFT_RELEASE = MAX_CHAMBER_TARGET + 1 %}

    {% set HEATER_MIN = VARS.heater_min|float %}

    {% set APPROACH_DELTA = VARS.approach_delta|float %}
    {% set FINE_DELTA = VARS.fine_delta|float %}
    {% set FINE_HEATER_TARGET = VARS.fine_heater_target|float %}

    {% set HEATER_SOFT_ALARM = VARS.heater_soft_alarm|int %}
    {% set HEATER_ALARM = VARS.heater_alarm|int %}
    {% set CHAMBER_ALARM = VARS.chamber_alarm|int %}

    {% set FAN_MIN = VARS.fan_min|float %}
    {% set FAN_HEAT_MAX = VARS.fan_heat_max|float %}
    {% set FAN_MAX = VARS.fan_max|float %}
    {% set FAN_GAIN = VARS.fan_gain|float %}

    {% set HEATING_CUTOFF = VARS.heating_cutoff_offset|float %}
    {% set HEATING_RESUME = VARS.heating_resume_offset|float %}
    {% set TARGET_HOLD = VARS.target_hold_alarm|int %}
    {% set HOLD_ENABLED = VARS.hold_enabled|int %}
    {% set HOLD_PTC_DELTA = VARS.hold_ptc_delta|float %}
    {% set HOLD_FAN_SPEED = VARS.hold_fan_speed|float %}

    {% set CONTROL_MODE = VARS.control_mode|int %}
    {% set AUTO_LINEAR_HEADROOM = VARS.auto_linear_headroom|float %}
    {% set AUTO_HYBRID_HEADROOM = VARS.auto_hybrid_headroom|float %}

    {% set PREDICTION_HORIZON = VARS.prediction_horizon|float %}
    {% set PREDICTION_PRE_TARGET_WINDOW = VARS.prediction_pre_target_window|float %}
    {% set THERMAL_MEMORY_WEIGHT = VARS.thermal_memory_weight|float %}
    {% set PREDICTION_RATE_GAIN = VARS.prediction_rate_gain|float %}
    {% set PREDICTION_RATE_DEADBAND = VARS.prediction_rate_deadband|float %}
    {% set ADAPTIVE_CURVE_MODE = VARS.adaptive_curve_mode|int %}
    {% set ADAPTIVE_MIN_PROGRESS = VARS.adaptive_min_progress|float %}
    {% set ADAPTIVE_MAX_PRE_TARGET_PROGRESS = VARS.adaptive_max_pre_target_progress|float %}

    {% set HEAT_ASSIST_DONE = VARS.heat_assist_done|int %}
    {% set HEAT_ASSIST_RELEASE_OFFSET = VARS.heat_assist_release_offset|float %}

    {% set COOLDOWN_TEMP = VARS.cooldown_temp|float %}
    {% set COOLDOWN_FAN = VARS.cooldown_fan|float %}
    {% set EXHAUST_COOLDOWN = VARS.exhaust_cooldown|float %}

    {% set OVERSHOOT_COOLING_DELTA = VARS.overshoot_cooling_delta|float %}
    {% set OVERSHOOT_COOLING_RELEASE = VARS.overshoot_cooling_release|float %}
    {% set OVERSHOOT_COOLING_ALARM = VARS.overshoot_cooling_alarm|int %}
    {% set EXHAUST_MIN = VARS.exhaust_min|float %}
    {% set EXHAUST_MAX = VARS.exhaust_max|float %}
    {% set EXHAUST_GAIN = VARS.exhaust_gain|float %}

    {% set LAST_CHAMBER = VARS.last_chamber|float %}
    {% set RATE_LIMIT = VARS.rate_limit|float %}

    {% set ERROR = TARGET - CHAMBER %}
    {% set OVER_TEMP = CHAMBER - TARGET %}

    {% if CHAMBER_ALARM == 0 and CHAMBER >= CHAMBER_SOFT_LIMIT %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=chamber_alarm VALUE=1
        {% set CHAMBER_ALARM = 1 %}
    {% elif CHAMBER_ALARM == 1 and CHAMBER <= CHAMBER_SOFT_RELEASE %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=chamber_alarm VALUE=0
        {% set CHAMBER_ALARM = 0 %}
    {% endif %}

    {% if OVERSHOOT_COOLING_ALARM == 0 and TARGET > 0 and OVER_TEMP >= OVERSHOOT_COOLING_DELTA %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=overshoot_cooling_alarm VALUE=1
        {% set OVERSHOOT_COOLING_ALARM = 1 %}
    {% elif OVERSHOOT_COOLING_ALARM == 1 and OVER_TEMP <= OVERSHOOT_COOLING_RELEASE %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=overshoot_cooling_alarm VALUE=0
        {% set OVERSHOOT_COOLING_ALARM = 0 %}
    {% endif %}

    # Release assist fans independently from the PTC cutoff/hold logic.
    # This lets RSCS be used manually or by other macros after heatup is complete.
    {% if HEAT_ASSIST_DONE == 0 and TARGET > 0 and CHAMBER >= TARGET + HEAT_ASSIST_RELEASE_OFFSET %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heat_assist_done VALUE=1
        _SET_HEAT_ASSIST_FANS SPEED=0
        {% set HEAT_ASSIST_DONE = 1 %}
    {% endif %}

    {% if TARGET_HOLD == 0 and TARGET > 0 and CHAMBER >= TARGET + HEATING_CUTOFF %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=target_hold_alarm VALUE=1
        {% set TARGET_HOLD = 1 %}
    {% elif TARGET_HOLD == 1 and TARGET > 0 and CHAMBER <= TARGET - HEATING_RESUME %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=target_hold_alarm VALUE=0
        {% set TARGET_HOLD = 0 %}
    {% endif %}

    {% if HEATER_SOFT_ALARM == 0 and HEATER_TEMP >= HEATER_SOFT_LIMIT %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heater_soft_alarm VALUE=1
        {% set HEATER_SOFT_ALARM = 1 %}
    {% elif HEATER_SOFT_ALARM == 1 and HEATER_TEMP <= HEATER_SOFT_RELEASE %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heater_soft_alarm VALUE=0
        {% set HEATER_SOFT_ALARM = 0 %}
    {% endif %}

    {% if HEATER_ALARM == 0 and HEATER_TEMP >= HEATER_SAFETY %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heater_alarm VALUE=1
        {% set HEATER_ALARM = 1 %}
    {% elif HEATER_ALARM == 1 and HEATER_TEMP <= HEATER_SAFETY_RELEASE %}
        SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=heater_alarm VALUE=0
        {% set HEATER_ALARM = 0 %}
    {% endif %}


    {% if TARGET <= 0 %}

        _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=0
        _SET_HEAT_ASSIST_FANS SPEED=0

        {% if HEATER_TEMP >= COOLDOWN_TEMP %}
            _SET_CHAMBER_FAN SPEED={COOLDOWN_FAN}
            _SET_EXHAUST_FAN SPEED={EXHAUST_COOLDOWN}
            UPDATE_DELAYED_GCODE ID=chamberloop DURATION=5
        {% else %}
            _SET_CHAMBER_FAN SPEED=0
            _SET_EXHAUST_FAN SPEED=0
        {% endif %}


    {% elif CHAMBER_ALARM == 1 %}

        _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=0
        _SET_CHAMBER_FAN SPEED={FAN_MAX}
        _SET_HEAT_ASSIST_FANS SPEED=0
        _SET_EXHAUST_FAN SPEED={EXHAUST_MAX}
        UPDATE_DELAYED_GCODE ID=chamberloop DURATION=5
        M117 Chamber high - PTC OFF


    {% elif OVERSHOOT_COOLING_ALARM == 1 %}

        {% set EXHAUST_SPEED = EXHAUST_MIN + ((OVER_TEMP - OVERSHOOT_COOLING_RELEASE) * EXHAUST_GAIN) %}

        {% if EXHAUST_SPEED > EXHAUST_MAX %}
            {% set EXHAUST_SPEED = EXHAUST_MAX %}
        {% elif EXHAUST_SPEED < EXHAUST_MIN %}
            {% set EXHAUST_SPEED = EXHAUST_MIN %}
        {% endif %}

        _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=0
        _SET_CHAMBER_FAN SPEED={FAN_MAX}
        _SET_HEAT_ASSIST_FANS SPEED=0
        _SET_EXHAUST_FAN SPEED={EXHAUST_SPEED}
        UPDATE_DELAYED_GCODE ID=chamberloop DURATION=5
        M117 Chamber overshoot cooling


    {% elif HEATER_ALARM == 1 %}

        _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=0
        _SET_CHAMBER_FAN SPEED={FAN_MAX}
        _SET_HEAT_ASSIST_FANS SPEED=0
        _SET_EXHAUST_FAN SPEED={EXHAUST_MAX}
        UPDATE_DELAYED_GCODE ID=chamberloop DURATION=5
        M117 PTC HOT - cooling


    {% elif HEATER_SOFT_ALARM == 1 %}

        _SET_EXHAUST_FAN SPEED=0
        _SET_HEAT_ASSIST_FANS SPEED=0
        _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={HEATER_SOFT_TARGET}
        _SET_CHAMBER_FAN SPEED={FAN_MAX}
        UPDATE_DELAYED_GCODE ID=chamberloop DURATION=3
        M117 PTC soft limit


    {% elif TARGET_HOLD == 1 %}

        _SET_EXHAUST_FAN SPEED=0

        {% if HOLD_ENABLED == 1 %}

            {% set HOLD_PTC_TARGET = TARGET + HOLD_PTC_DELTA %}

            {% if HOLD_PTC_TARGET > HEATER_MAX %}
                {% set HOLD_PTC_TARGET = HEATER_MAX %}
            {% elif HOLD_PTC_TARGET < 0 %}
                {% set HOLD_PTC_TARGET = 0 %}
            {% endif %}

            {% if HOLD_FAN_SPEED > FAN_MAX %}
                {% set HOLD_FAN_SPEED = FAN_MAX %}
            {% elif HOLD_FAN_SPEED < 0 %}
                {% set HOLD_FAN_SPEED = 0 %}
            {% endif %}

            _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={HOLD_PTC_TARGET}
            _SET_CHAMBER_FAN SPEED={HOLD_FAN_SPEED}

        {% else %}

            _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=0
            _SET_CHAMBER_FAN SPEED={FAN_MIN}

        {% endif %}

        UPDATE_DELAYED_GCODE ID=chamberloop DURATION=6


    #################################################
    # ADAPTIVE HEAT-UP CONTROL
    #
    # This block selects one of three algorithms:
    #
    # LINEAR CONTROL
    # - Current chamber temperature only.
    # - PTC and fans stay at heat-up maximum until TARGET.
    # - From TARGET to TARGET + cutoff, they unload linearly.
    #
    # HYBRID PREDICTIVE CONTROL
    # - Mostly keeps full-power heat-up.
    # - Predictive unloading starts only if future chamber temperature
    #   is expected to enter or exceed the configured target window.
    #
    # FULL ADAPTIVE PREDICTIVE CONTROL
    # - Uses chamber temperature, chamber rise rate and PTC stored heat.
    # - Uses adaptive curve shaping to adapt PTC and fan output.
    #
    # Safety branches above this block always have priority.
    #################################################
    {% else %}

        _SET_EXHAUST_FAN SPEED=0

        #################################################
        # SHARED TARGETS AND THERMAL HEADROOM
        #################################################
        {% set HOLD_PTC_TARGET = TARGET + HOLD_PTC_DELTA %}

        {% if HOLD_PTC_TARGET > HEATER_MAX %}
            {% set HOLD_PTC_TARGET = HEATER_MAX %}
        {% elif HOLD_PTC_TARGET < 0 %}
            {% set HOLD_PTC_TARGET = 0 %}
        {% endif %}

        {% set THERMAL_HEADROOM = HEATER_MAX - TARGET %}

        #################################################
        # AUTOMATIC CONTROL SELECTION
        #
        # If control_mode is:
        # -1: choose automatically from available thermal headroom.
        #  0: force Linear Control.
        #  1: force Hybrid Predictive Control.
        #  2: force Full Adaptive Predictive Control.
        #################################################
        {% if CONTROL_MODE < 0 %}
            {% if THERMAL_HEADROOM <= AUTO_LINEAR_HEADROOM %}
                {% set SELECTED_CONTROL_MODE = 0 %}
            {% elif THERMAL_HEADROOM <= AUTO_HYBRID_HEADROOM %}
                {% set SELECTED_CONTROL_MODE = 1 %}
            {% else %}
                {% set SELECTED_CONTROL_MODE = 2 %}
            {% endif %}
        {% else %}
            {% set SELECTED_CONTROL_MODE = CONTROL_MODE %}
        {% endif %}

        #################################################
        # PREDICTION MODEL
        #
        # CHAMBER_RATE:
        # Difference between current and previous chamber reading.
        #
        # PTC_EXCESS:
        # How much hotter the PTC is compared to the HOLD PTC target.
        #
        # PREDICTED_CHAMBER:
        # Estimated future chamber temperature using chamber rate
        # and remaining PTC thermal energy.
        #################################################
        {% if LAST_CHAMBER > 0 %}
            {% set CHAMBER_RATE = CHAMBER - LAST_CHAMBER %}
        {% else %}
            {% set CHAMBER_RATE = 0 %}
        {% endif %}

        {% if CHAMBER_RATE < PREDICTION_RATE_DEADBAND and CHAMBER_RATE > -PREDICTION_RATE_DEADBAND %}
            {% set EFFECTIVE_RATE = 0 %}
        {% else %}
            {% set EFFECTIVE_RATE = CHAMBER_RATE %}
        {% endif %}

        {% set PTC_EXCESS = HEATER_TEMP - HOLD_PTC_TARGET %}
        {% if PTC_EXCESS < 0 %}
            {% set PTC_EXCESS = 0 %}
        {% endif %}

        {% set PREDICTED_CHAMBER = CHAMBER + (EFFECTIVE_RATE * PREDICTION_HORIZON * PREDICTION_RATE_GAIN) + (PTC_EXCESS * THERMAL_MEMORY_WEIGHT) %}

        #################################################
        # LINEAR CONTROL
        #
        # Best for limited heaters.
        #
        # Below TARGET:
        # - PTC = HEATER_MAX
        # - fans = FAN_HEAT_MAX
        #
        # From TARGET to TARGET + heating_cutoff_offset:
        # - PTC/fans unload linearly toward HOLD values.
        #################################################
        {% if SELECTED_CONTROL_MODE == 0 %}

            {% if CHAMBER < TARGET %}
                {% set RAW_PROGRESS = 0 %}
            {% else %}
                {% if HEATING_CUTOFF > 0 %}
                    {% set RAW_PROGRESS = (CHAMBER - TARGET) / HEATING_CUTOFF %}
                {% else %}
                    {% set RAW_PROGRESS = 1 %}
                {% endif %}
            {% endif %}

            {% if RAW_PROGRESS > 1 %}
                {% set RAW_PROGRESS = 1 %}
            {% elif RAW_PROGRESS < 0 %}
                {% set RAW_PROGRESS = 0 %}
            {% endif %}

            {% set CURVE_PROGRESS = RAW_PROGRESS %}

        #################################################
        # HYBRID PREDICTIVE CONTROL
        #
        # Best when heat-up speed is still important,
        # but the heater has enough headroom to overshoot.
        #
        # Below TARGET:
        # - stays at maximum unless prediction shows that the chamber
        #   may exceed TARGET + cutoff.
        #
        # At and above TARGET:
        # - unloads according to the larger of real chamber progress
        #   and predictive progress.
        #################################################
        {% elif SELECTED_CONTROL_MODE == 1 %}

            {% if HEATING_CUTOFF > 0 %}
                {% set REAL_PROGRESS = (CHAMBER - TARGET) / HEATING_CUTOFF %}
            {% else %}
                {% set REAL_PROGRESS = 1 %}
            {% endif %}

            {% if REAL_PROGRESS > 1 %}
                {% set REAL_PROGRESS = 1 %}
            {% elif REAL_PROGRESS < 0 %}
                {% set REAL_PROGRESS = 0 %}
            {% endif %}

            {% if HEATING_CUTOFF > 0 %}
                {% set PREDICTIVE_PROGRESS = (PREDICTED_CHAMBER - TARGET) / HEATING_CUTOFF %}
            {% else %}
                {% set PREDICTIVE_PROGRESS = 1 %}
            {% endif %}

            {% if PREDICTIVE_PROGRESS > 1 %}
                {% set PREDICTIVE_PROGRESS = 1 %}
            {% elif PREDICTIVE_PROGRESS < 0 %}
                {% set PREDICTIVE_PROGRESS = 0 %}
            {% endif %}

            {% if CHAMBER < TARGET and PREDICTIVE_PROGRESS > ADAPTIVE_MAX_PRE_TARGET_PROGRESS %}
                {% set PREDICTIVE_PROGRESS = ADAPTIVE_MAX_PRE_TARGET_PROGRESS %}
            {% endif %}

            {% if PREDICTIVE_PROGRESS > REAL_PROGRESS %}
                {% set RAW_PROGRESS = PREDICTIVE_PROGRESS %}
            {% else %}
                {% set RAW_PROGRESS = REAL_PROGRESS %}
            {% endif %}

            {% if RAW_PROGRESS > 0 and RAW_PROGRESS < ADAPTIVE_MIN_PROGRESS %}
                {% set RAW_PROGRESS = ADAPTIVE_MIN_PROGRESS %}
            {% endif %}

            {% if ADAPTIVE_CURVE_MODE == 1 %}
                {% set CURVE_PROGRESS = RAW_PROGRESS * RAW_PROGRESS %}
            {% elif ADAPTIVE_CURVE_MODE == 2 %}
                {% set CURVE_PROGRESS = (RAW_PROGRESS * RAW_PROGRESS) * (3 - (2 * RAW_PROGRESS)) %}
            {% else %}
                {% set CURVE_PROGRESS = RAW_PROGRESS %}
            {% endif %}

        #################################################
        # FULL ADAPTIVE PREDICTIVE CONTROL
        #
        # Best for high-headroom heaters.
        #
        # Uses a prediction window starting before TARGET and ending at
        # TARGET + heating_cutoff_offset. The output is shaped by the
        # selected adaptive curve.
        #################################################
        {% else %}

            {% set PREDICTION_START = TARGET - PREDICTION_PRE_TARGET_WINDOW %}
            {% set PREDICTION_END = TARGET + HEATING_CUTOFF %}
            {% set PREDICTION_RANGE = PREDICTION_END - PREDICTION_START %}

            {% if PREDICTION_RANGE <= 0 %}
                {% set RAW_PROGRESS = 1 %}
            {% else %}
                {% set RAW_PROGRESS = (PREDICTED_CHAMBER - PREDICTION_START) / PREDICTION_RANGE %}
            {% endif %}

            {% if RAW_PROGRESS > 1 %}
                {% set RAW_PROGRESS = 1 %}
            {% elif RAW_PROGRESS < 0 %}
                {% set RAW_PROGRESS = 0 %}
            {% endif %}

            {% if CHAMBER < TARGET and RAW_PROGRESS > ADAPTIVE_MAX_PRE_TARGET_PROGRESS %}
                {% set RAW_PROGRESS = ADAPTIVE_MAX_PRE_TARGET_PROGRESS %}
            {% endif %}

            {% if RAW_PROGRESS > 0 and RAW_PROGRESS < ADAPTIVE_MIN_PROGRESS %}
                {% set RAW_PROGRESS = ADAPTIVE_MIN_PROGRESS %}
            {% endif %}

            {% if ADAPTIVE_CURVE_MODE == 1 %}
                {% set CURVE_PROGRESS = RAW_PROGRESS * RAW_PROGRESS %}
            {% elif ADAPTIVE_CURVE_MODE == 2 %}
                {% set CURVE_PROGRESS = (RAW_PROGRESS * RAW_PROGRESS) * (3 - (2 * RAW_PROGRESS)) %}
            {% else %}
                {% set CURVE_PROGRESS = RAW_PROGRESS %}
            {% endif %}

        {% endif %}

        #################################################
        # CONTROL OUTPUT
        #
        # progress = 0:
        # - PTC and fans at heat-up maximum.
        #
        # progress = 1:
        # - PTC and fans at HOLD values.
        #################################################
        {% set PTC_TARGET = HEATER_MAX - ((HEATER_MAX - HOLD_PTC_TARGET) * CURVE_PROGRESS) %}
        {% set FAN_SPEED = FAN_HEAT_MAX - ((FAN_HEAT_MAX - HOLD_FAN_SPEED) * CURVE_PROGRESS) %}

        #################################################
        # OUTPUT CLAMPS
        #################################################
        {% if PTC_TARGET > HEATER_MAX %}
            {% set PTC_TARGET = HEATER_MAX %}
        {% elif PTC_TARGET < HEATER_MIN %}
            {% set PTC_TARGET = HEATER_MIN %}
        {% endif %}

        {% if FAN_SPEED > FAN_MAX %}
            {% set FAN_SPEED = FAN_MAX %}
        {% elif FAN_SPEED < 0 %}
            {% set FAN_SPEED = 0 %}
        {% endif %}

        _SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={PTC_TARGET}
        _SET_CHAMBER_FAN SPEED={FAN_SPEED}

        {% if HEAT_ASSIST_DONE == 0 %}
            _SET_HEAT_ASSIST_FANS SPEED={FAN_SPEED}
        {% endif %}

        {% if ERROR < 2 %}
            UPDATE_DELAYED_GCODE ID=chamberloop DURATION=6
        {% else %}
            UPDATE_DELAYED_GCODE ID=chamberloop DURATION=3
        {% endif %}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_CHAMBERVARS VARIABLE=last_chamber VALUE={CHAMBER}



#################################################
# DIAGNOSTIC MACRO - CONTROL STATUS
#################################################
[gcode_macro CHAMBER_CONTROL_STATUS]
description: Show current chamber control mode, prediction and next control decision
gcode:
    {% set VARS = printer["gcode_macro _CHAMBERVARS"] %}
    {% set TARGET = printer["gcode_macro _CHAMBER_TARGET"].target|float %}
    {% set CHAMBER = printer["temperature_sensor Chamber_Temperature"].temperature|float %}
    {% set HEATER_TEMP = printer["heater_generic chamber_heater"].temperature|float %}
    {% set LAST_CHAMBER = VARS.last_chamber|float %}

    {% set THERMAL_FUSE = VARS.thermal_fuse_temp|float %}
    {% set HEATER_MAX = THERMAL_FUSE - 10 %}
    {% set HEATER_MIN = VARS.heater_min|float %}
    {% set HOLD_PTC_TARGET = TARGET + VARS.hold_ptc_delta|float %}
    {% if HOLD_PTC_TARGET > HEATER_MAX %}
        {% set HOLD_PTC_TARGET = HEATER_MAX %}
    {% elif HOLD_PTC_TARGET < 0 %}
        {% set HOLD_PTC_TARGET = 0 %}
    {% endif %}

    {% set CONTROL_MODE = VARS.control_mode|int %}
    {% set AUTO_LINEAR_HEADROOM = VARS.auto_linear_headroom|float %}
    {% set AUTO_HYBRID_HEADROOM = VARS.auto_hybrid_headroom|float %}

    {% set PREDICTION_HORIZON = VARS.prediction_horizon|float %}
    {% set PREDICTION_PRE_TARGET_WINDOW = VARS.prediction_pre_target_window|float %}
    {% set THERMAL_MEMORY_WEIGHT = VARS.thermal_memory_weight|float %}
    {% set PREDICTION_RATE_GAIN = VARS.prediction_rate_gain|float %}
    {% set PREDICTION_RATE_DEADBAND = VARS.prediction_rate_deadband|float %}
    {% set ADAPTIVE_CURVE_MODE = VARS.adaptive_curve_mode|int %}
    {% set ADAPTIVE_MIN_PROGRESS = VARS.adaptive_min_progress|float %}
    {% set ADAPTIVE_MAX_PRE_TARGET_PROGRESS = VARS.adaptive_max_pre_target_progress|float %}

    {% set HEATING_CUTOFF = VARS.heating_cutoff_offset|float %}
    {% set HOLD_FAN_SPEED = VARS.hold_fan_speed|float %}
    {% set FAN_HEAT_MAX = VARS.fan_heat_max|float %}

    {% set THERMAL_HEADROOM = HEATER_MAX - TARGET %}

    {% if CONTROL_MODE < 0 %}
        {% if THERMAL_HEADROOM <= AUTO_LINEAR_HEADROOM %}
            {% set SELECTED_CONTROL_MODE = 0 %}
            {% set SELECTED_NAME = "LINEAR CONTROL" %}
        {% elif THERMAL_HEADROOM <= AUTO_HYBRID_HEADROOM %}
            {% set SELECTED_CONTROL_MODE = 1 %}
            {% set SELECTED_NAME = "HYBRID PREDICTIVE CONTROL" %}
        {% else %}
            {% set SELECTED_CONTROL_MODE = 2 %}
            {% set SELECTED_NAME = "FULL ADAPTIVE PREDICTIVE CONTROL" %}
        {% endif %}
        {% set REQUESTED_NAME = "AUTO" %}
    {% else %}
        {% set SELECTED_CONTROL_MODE = CONTROL_MODE %}
        {% if CONTROL_MODE == 0 %}
            {% set REQUESTED_NAME = "LINEAR CONTROL" %}
            {% set SELECTED_NAME = "LINEAR CONTROL" %}
        {% elif CONTROL_MODE == 1 %}
            {% set REQUESTED_NAME = "HYBRID PREDICTIVE CONTROL" %}
            {% set SELECTED_NAME = "HYBRID PREDICTIVE CONTROL" %}
        {% else %}
            {% set REQUESTED_NAME = "FULL ADAPTIVE PREDICTIVE CONTROL" %}
            {% set SELECTED_NAME = "FULL ADAPTIVE PREDICTIVE CONTROL" %}
        {% endif %}
    {% endif %}

    {% if LAST_CHAMBER > 0 %}
        {% set CHAMBER_RATE = CHAMBER - LAST_CHAMBER %}
    {% else %}
        {% set CHAMBER_RATE = 0 %}
    {% endif %}

    {% if CHAMBER_RATE < PREDICTION_RATE_DEADBAND and CHAMBER_RATE > -PREDICTION_RATE_DEADBAND %}
        {% set EFFECTIVE_RATE = 0 %}
    {% else %}
        {% set EFFECTIVE_RATE = CHAMBER_RATE %}
    {% endif %}

    {% set PTC_EXCESS = HEATER_TEMP - HOLD_PTC_TARGET %}
    {% if PTC_EXCESS < 0 %}
        {% set PTC_EXCESS = 0 %}
    {% endif %}

    {% set PREDICTED_CHAMBER = CHAMBER + (EFFECTIVE_RATE * PREDICTION_HORIZON * PREDICTION_RATE_GAIN) + (PTC_EXCESS * THERMAL_MEMORY_WEIGHT) %}

    {% if SELECTED_CONTROL_MODE == 0 %}
        {% if CHAMBER < TARGET %}
            {% set RAW_PROGRESS = 0 %}
        {% else %}
            {% if HEATING_CUTOFF > 0 %}
                {% set RAW_PROGRESS = (CHAMBER - TARGET) / HEATING_CUTOFF %}
            {% else %}
                {% set RAW_PROGRESS = 1 %}
            {% endif %}
        {% endif %}
    {% elif SELECTED_CONTROL_MODE == 1 %}
        {% if HEATING_CUTOFF > 0 %}
            {% set REAL_PROGRESS = (CHAMBER - TARGET) / HEATING_CUTOFF %}
            {% set PREDICTIVE_PROGRESS = (PREDICTED_CHAMBER - TARGET) / HEATING_CUTOFF %}
        {% else %}
            {% set REAL_PROGRESS = 1 %}
            {% set PREDICTIVE_PROGRESS = 1 %}
        {% endif %}

        {% if REAL_PROGRESS > 1 %}
            {% set REAL_PROGRESS = 1 %}
        {% elif REAL_PROGRESS < 0 %}
            {% set REAL_PROGRESS = 0 %}
        {% endif %}

        {% if PREDICTIVE_PROGRESS > 1 %}
            {% set PREDICTIVE_PROGRESS = 1 %}
        {% elif PREDICTIVE_PROGRESS < 0 %}
            {% set PREDICTIVE_PROGRESS = 0 %}
        {% endif %}

        {% if CHAMBER < TARGET and PREDICTIVE_PROGRESS > ADAPTIVE_MAX_PRE_TARGET_PROGRESS %}
            {% set PREDICTIVE_PROGRESS = ADAPTIVE_MAX_PRE_TARGET_PROGRESS %}
        {% endif %}

        {% if PREDICTIVE_PROGRESS > REAL_PROGRESS %}
            {% set RAW_PROGRESS = PREDICTIVE_PROGRESS %}
        {% else %}
            {% set RAW_PROGRESS = REAL_PROGRESS %}
        {% endif %}
    {% else %}
        {% set PREDICTION_START = TARGET - PREDICTION_PRE_TARGET_WINDOW %}
        {% set PREDICTION_END = TARGET + HEATING_CUTOFF %}
        {% set PREDICTION_RANGE = PREDICTION_END - PREDICTION_START %}

        {% if PREDICTION_RANGE <= 0 %}
            {% set RAW_PROGRESS = 1 %}
        {% else %}
            {% set RAW_PROGRESS = (PREDICTED_CHAMBER - PREDICTION_START) / PREDICTION_RANGE %}
        {% endif %}

        {% if CHAMBER < TARGET and RAW_PROGRESS > ADAPTIVE_MAX_PRE_TARGET_PROGRESS %}
            {% set RAW_PROGRESS = ADAPTIVE_MAX_PRE_TARGET_PROGRESS %}
        {% endif %}
    {% endif %}

    {% if RAW_PROGRESS > 1 %}
        {% set RAW_PROGRESS = 1 %}
    {% elif RAW_PROGRESS < 0 %}
        {% set RAW_PROGRESS = 0 %}
    {% endif %}

    {% if RAW_PROGRESS > 0 and RAW_PROGRESS < ADAPTIVE_MIN_PROGRESS %}
        {% set RAW_PROGRESS = ADAPTIVE_MIN_PROGRESS %}
    {% endif %}

    {% if SELECTED_CONTROL_MODE == 0 %}
        {% set CURVE_PROGRESS = RAW_PROGRESS %}
    {% elif ADAPTIVE_CURVE_MODE == 1 %}
        {% set CURVE_PROGRESS = RAW_PROGRESS * RAW_PROGRESS %}
    {% elif ADAPTIVE_CURVE_MODE == 2 %}
        {% set CURVE_PROGRESS = (RAW_PROGRESS * RAW_PROGRESS) * (3 - (2 * RAW_PROGRESS)) %}
    {% else %}
        {% set CURVE_PROGRESS = RAW_PROGRESS %}
    {% endif %}

    {% set NEXT_PTC_TARGET = HEATER_MAX - ((HEATER_MAX - HOLD_PTC_TARGET) * CURVE_PROGRESS) %}
    {% set NEXT_FAN_SPEED = FAN_HEAT_MAX - ((FAN_HEAT_MAX - HOLD_FAN_SPEED) * CURVE_PROGRESS) %}

    {% if NEXT_PTC_TARGET > HEATER_MAX %}
        {% set NEXT_PTC_TARGET = HEATER_MAX %}
    {% elif NEXT_PTC_TARGET < HEATER_MIN %}
        {% set NEXT_PTC_TARGET = HEATER_MIN %}
    {% endif %}

    RESPOND MSG="--- CHAMBER CONTROL STATUS ---"
    RESPOND MSG="Requested mode: {REQUESTED_NAME} | Selected mode: {SELECTED_NAME}"
    RESPOND MSG="Target={TARGET}C | Chamber={CHAMBER}C | PTC={HEATER_TEMP}C"
    RESPOND MSG="Thermal headroom={THERMAL_HEADROOM}C | Heater max={HEATER_MAX}C | Hold PTC={HOLD_PTC_TARGET}C"
    RESPOND MSG="Rate={CHAMBER_RATE}C/loop | Effective rate={EFFECTIVE_RATE}C/loop | PTC excess={PTC_EXCESS}C"
    RESPOND MSG="Predicted chamber={PREDICTED_CHAMBER}C | Cutoff={TARGET + HEATING_CUTOFF}C"
    RESPOND MSG="Raw progress={RAW_PROGRESS} | Curve progress={CURVE_PROGRESS}"
    RESPOND MSG="Next PTC target={NEXT_PTC_TARGET}C | Next fan speed={NEXT_FAN_SPEED}"


#################################################
# DIAGNOSTIC MACRO - PREDICTION VALUES
#################################################
[gcode_macro CHAMBER_PREDICTION_STATUS]
description: Show current prediction values used by predictive control
gcode:
    CHAMBER_CONTROL_STATUS

#################################################
# Chamber Heater PID Calibration
#
# Runs a dedicated PID calibration for the chamber heater.
#
# IMPORTANT
#
# If your chamber heater is defined in an included
# configuration file, SAVE_CONFIG may NOT write the
# generated PID values back into that file.
#
# Copy the generated:
#
#   pid_Kp
#   pid_Ki
#   pid_Kd
#
# manually into:
#
# [heater_generic chamber_heater]
#
# Then restart Klipper.
#################################################

[gcode_macro CHAMBER_PID_CALIBRATE]
description: Run PID calibration for the chamber heater
gcode:

    {% set TARGET = params.TARGET|default(75)|float %}

    RESPOND TYPE=command MSG="=========================================="
    RESPOND TYPE=command MSG=" Chamber Heater PID Calibration"
    RESPOND TYPE=command MSG=" Target: {TARGET}°C"
    RESPOND TYPE=command MSG="=========================================="

    RESPOND TYPE=command MSG="The generated PID values must be copied manually."
    RESPOND TYPE=command MSG="SAVE_CONFIG may not update included config files."

    PID_CALIBRATE HEATER=chamber_heater TARGET={TARGET}

    RESPOND TYPE=command MSG="=========================================="
    RESPOND TYPE=command MSG="Calibration completed."
    RESPOND TYPE=command MSG="Copy pid_Kp pid_Ki pid_Kd into:"
    RESPOND TYPE=command MSG="[heater_generic chamber_heater]"
    RESPOND TYPE=command MSG="Restart Klipper afterwards."
    RESPOND TYPE=command MSG="=========================================="

#################################################
# QUICK TUNING GUIDE
#
# Chamber reaches target too slowly:
# -> Use Linear Control or reduce predictive aggressiveness.
# -> Lower prediction_horizon.
# -> Lower thermal_memory_weight.
# -> Lower prediction_pre_target_window.
#
# Chamber overshoots after heat-up:
# -> Use Hybrid Predictive or Full Adaptive Predictive Control.
# -> Increase prediction_horizon.
# -> Increase thermal_memory_weight.
# -> Increase prediction_pre_target_window.
#
# Predictive control unloads too early:
# -> Decrease adaptive_max_pre_target_progress.
# -> Decrease prediction_rate_gain.
# -> Decrease thermal_memory_weight.
#
# Predictive control unloads too late:
# -> Increase adaptive_max_pre_target_progress.
# -> Increase prediction_rate_gain.
# -> Increase thermal_memory_weight.
#
# Weak heater / low thermal headroom:
# -> Prefer Linear Control or Hybrid Predictive Control.
#
# Powerful heater / high thermal headroom:
# -> Prefer Hybrid Predictive or Full Adaptive Predictive Control.
#
# Safety reminder:
# Do not set thermal_fuse_temp above the real installed thermal fuse rating.
#################################################
